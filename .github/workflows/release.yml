name: release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Install packaging tools
        run: uv pip install --system twine

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Smoke-import from built wheel
        run: |
          python -m venv /tmp/relcheck
          /tmp/relcheck/bin/pip install --quiet dist/*.whl
          /tmp/relcheck/bin/python -c "import boto_lite; from boto_lite import S3Client, SQSClient, SecretsClient; print('ok:', boto_lite.__all__)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/boto-lite
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
